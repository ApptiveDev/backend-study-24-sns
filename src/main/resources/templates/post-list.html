<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시글 목록 - SNS</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #fafafa;
        }

        nav {
            background: #fff;
            border-bottom: 1px solid #dbdbdb;
            padding: 0 20px;
            height: 54px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
        }

        .nav-logo { font-size: 22px; font-weight: 700; letter-spacing: -1px; color: #262626; }
        .nav-actions { display: flex; gap: 8px; align-items: center; }

        .btn-write {
            background: #0095f6;
            color: #fff;
            border: none;
            border-radius: 4px;
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
        }

        .btn-write:hover { background: #1877f2; }

        .feed { max-width: 600px; margin: 32px auto; padding: 0 20px; }

        .post-card {
            background: #fff;
            border: 1px solid #dbdbdb;
            border-radius: 8px;
            padding: 20px 24px;
            margin-bottom: 16px;
            cursor: pointer;
            transition: box-shadow 0.15s;
        }

        .post-card:hover { box-shadow: 0 1px 6px rgba(0,0,0,0.08); }

        .post-title {
            font-size: 16px;
            font-weight: 600;
            color: #262626;
            margin-bottom: 6px;
        }

        .post-meta {
            font-size: 13px;
            color: #8e8e8e;
            margin-bottom: 10px;
        }

        .post-preview {
            font-size: 14px;
            color: #444;
            line-height: 1.5;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .empty-box {
            text-align: center;
            color: #8e8e8e;
            padding: 60px 0;
            font-size: 14px;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 24px;
        }

        .pagination a {
            padding: 6px 12px;
            border: 1px solid #dbdbdb;
            border-radius: 4px;
            text-decoration: none;
            color: #262626;
            font-size: 13px;
        }

        .pagination a:hover { background: #fafafa; }
        .pagination .disabled { color: #c7c7c7; pointer-events: none; }
    </style>
</head>
<body>

<nav>
    <span class="nav-logo">SNS</span>
    <div class="nav-actions">
        <a href="/view/posts/new" class="btn-write">글쓰기</a>
        <a href="/view/mypage" style="font-size:13px; color:#262626; text-decoration:none;">마이페이지</a>
    </div>
</nav>

<div class="feed">

    <div th:if="${posts.empty}" class="empty-box">
        아직 작성된 게시글이 없습니다.
    </div>

    <a th:each="post : ${posts.content}"
       th:href="@{/view/posts/{id}(id=${post.id})}"
       style="text-decoration:none;">
        <div class="post-card">
            <div class="post-title" th:text="${post.title}">제목</div>
            <div class="post-meta">
                <span th:text="${post.username}">작성자</span> ·
                <span th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">날짜</span>
            </div>
            <div class="post-preview" th:text="${post.content}">내용 미리보기</div>
        </div>
    </a>

    <div class="pagination" th:if="${posts.totalPages > 1}">
        <a th:if="${posts.hasPrevious()}"
           th:href="@{/view/posts(page=${posts.number - 1})}">이전</a>
        <span th:unless="${posts.hasPrevious()}" class="disabled">이전</span>

        <a th:if="${posts.hasNext()}"
           th:href="@{/view/posts(page=${posts.number + 1})}">다음</a>
        <span th:unless="${posts.hasNext()}" class="disabled">다음</span>
    </div>

</div>

</body>
</html>
