<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>SNS 피드</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #fafafa;
      margin: 0;
      padding: 20px;
    }
    .header {
      background: white;
      border-bottom: 1px solid #dbdbdb;
      padding: 16px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 24px;
    }
    .welcome {
      text-align: center;
      color: #262626;
      font-size: 18px;
      margin-bottom: 16px;
    }
    .token-box {
      background: white;
      border: 1px solid #dbdbdb;
      border-radius: 8px;
      padding: 16px;
      max-width: 500px;
      margin: 0 auto;
      word-break: break-all;
      font-size: 13px;
      color: #555;
    }
    .token-label {
      font-weight: bold;
      margin-bottom: 8px;
      color: #262626;
    }
  </style>
</head>
<body>
<div class="header">SNS</div>

<p class="welcome">
  <!-- 로그인한 이메일 표시 -->
  <span th:text="${email}"></span>님 환영합니다! 🎉
</p>

<div class="token-box">
  <div class="token-label">발급된 Access Token</div>
  <!-- 발급된 토큰 표시 -->
  <div th:text="${accessToken}"></div>
</div>
</body>
</html>
