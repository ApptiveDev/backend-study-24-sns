<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>홈</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .home-container {
            background: white;
            padding: 60px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 32px;
        }

        .user-info {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 12px;
            margin: 30px 0;
        }

        .user-info p {
            color: #666;
            margin: 8px 0;
            font-size: 16px;
        }

        .user-info strong {
            color: #333;
        }

        .success-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .logout-btn {
            margin-top: 20px;
            padding: 12px 24px;
            background: #f44336;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .logout-btn:hover {
            transform: translateY(-2px);
            background: #d32f2f;
        }
    </style>
</head>
<body>
    <div class="home-container">
        <div class="success-icon">✅</div>
        <h1>로그인 성공!</h1>

        <div class="user-info">
            <p><strong>사용자 ID:</strong> <span th:text="${userId}">1</span></p>
            <p><strong>이메일:</strong> <span th:text="${email}">user@email.com</span></p>
        </div>

        <p style="color: #666; margin-bottom: 20px;">
            Thymeleaf를 이용한 로그인 화면 구현이 성공적으로 완료되었습니다.
        </p>

        <a href="/logout" class="logout-btn">로그아웃</a>
    </div>
</body>
</html>
