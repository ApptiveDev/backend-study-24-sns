<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>로그인</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f6fa;
        }

        .login-container {
            width: 360px;
            margin: 120px auto;
            padding: 30px;
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-top: 12px;
            margin-bottom: 6px;
            font-weight: bold;
        }

        input {
            width: 100%;
            height: 38px;
            padding: 8px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            height: 42px;
            margin-top: 20px;
            background-color: #4a69bd;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .error {
            margin-top: 16px;
            color: red;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="login-container">
    <h2>로그인</h2>

    <form action="/login" method="post">
        <label>이메일</label>
        <input type="email" name="email" placeholder="이메일을 입력하세요" required>

        <label>비밀번호</label>
        <input type="password" name="password" placeholder="비밀번호를 입력하세요" required>

        <button type="submit">로그인</button>
    </form>

    <p class="error" th:if="${error}" th:text="${error}"></p>
</div>

</body>
</html>
