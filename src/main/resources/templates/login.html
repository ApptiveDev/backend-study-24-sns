<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SNS 로그인</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #fafafa;
            font-family: Arial, sans-serif;
        }
        .login-box {
            background: white;
            padding: 40px;
            border: 1px solid #dbdbdb;
            border-radius: 8px;
            width: 350px;
            text-align: center;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 24px;
            color: #262626;
        }
        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 12px;
            border: 1px solid #dbdbdb;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #0095f6;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0081d6;
        }
        .error {
            color: red;
            font-size: 13px;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
<div class="login-box">
    <h1>SNS</h1>

    <!-- 로그인 실패 시 에러 메시지 표시 -->
    <p class="error" th:if="${error}" th:text="${error}"></p>

    <form method="post" action="/login">
        <input type="email" name="email" placeholder="이메일" required />
        <input type="password" name="password" placeholder="비밀번호" required />
        <button type="submit">로그인</button>
    </form>
</div>
</body>
</html>
