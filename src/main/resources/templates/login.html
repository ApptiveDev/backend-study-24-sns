<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNS Login</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
<main class="auth-shell">
    <section class="login-panel">
        <div class="brand">
            <span class="brand-mark">SNS</span>
            <h1>로그인</h1>
        </div>

        <form th:action="@{/login}" th:object="${loginRequest}" method="post" class="login-form">
            <p class="field-error" th:if="${#fields.hasGlobalErrors()}" th:each="error : ${#fields.globalErrors()}" th:text="${error}"></p>

            <label for="username">아이디</label>
            <input id="username" type="text" th:field="*{username}" placeholder="username" autocomplete="username">
            <p class="field-error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></p>

            <button type="submit">로그인</button>
        </form>
    </section>
</main>
</body>
</html>
