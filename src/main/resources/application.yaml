spring:
  application:
    name: sns

  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:snsdb
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret-key: ${JWT_SECRET_KEY}
  access-token-expire-time: 3600000