spring:
  application:
    name: sns

  # 1. DB 접속 정보 (창고 위치와 열쇠)
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:snsdb
    username: sa
    password:

  # 2. H2 콘솔 설정 (웹에서 DB 확인용)
  h2:
    console:
      enabled: true
      path: /h2-console

  # 3. JPA 설정 (테이블 자동 생성 및 SQL 로그)
  jpa:
    hibernate:
      ddl-auto: create  # 서버 켤 때마다 @Entity를 보고 테이블을 만들어줍니다.
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true      # 실행되는 쿼리를 콘솔에 예쁘게 보여줍니다.