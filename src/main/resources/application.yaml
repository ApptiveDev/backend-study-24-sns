spring:
  application:
    name: sns

  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:snsdb # ПјЧЯДТ РЬИЇ
    username: username
    password: password

  h2:
    console:
      enabled: true # trueЗЮ МГСЄ НУ consoleЗЮ DBАЁ Рп ИИЕщОюСГДТСі ШЎРЮ АЁДЩЧд
      path: /h2-console # localhost:8080 ЕкПЁ КйДТ URI

  jpa:
    hibernate:
      ddl-auto: create
    database-platform: org.hibernate.dialect.H2Dialect # JPAАЁ H2 СпНЩРИЗЮ SQL БИЙЎ ЧиМЎ
    show-sql: true # JPAАЁ Л§МКЧЯДТ SQLЙЎРЛ ЗЮБзЗЮ КИАэ НЭРЛ ЖЇ true
