spring:
  application:
    name: sns

  datasource:
    url: jdbc:h2:mem:sns-db
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.hibernate.SQL: debug

jwt:
  secret: change-this-secret-key-for-local-study
  access-token-expiration-seconds: 3600
  refresh-token-expiration-days: 14

cors:
  allowed-origins: http://localhost:3000,http://localhost:5173
