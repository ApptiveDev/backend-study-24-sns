spring:
  application:
    name: sns

  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:snsdb
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true

# JWT 설정 추가
jwt:
  secret: ${JWT_SECRET:my-default-secret-key-for-dev-must-be-32chars}